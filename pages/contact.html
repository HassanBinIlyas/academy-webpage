<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARZ Academy</title>
    <link rel="shortcut icon" href="../assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div id="logo">
            <a href="../index.html"><img src="../assets/images/logo.png" alt="Logo"></a>
        </div>
        <nav>
            <a href="../index.html">Home</a>
            <a href="./courses.html">Courses</a>
            <a href="./about.html">About</a>
            <a href="./contact.html">Contact</a>
        </nav>
        <img id="menu" src="../assets/images/menu-icon.png" alt="Menu">
    </header>


    <main>
        <article class="hero-sec">
            <div class="hero-overlay">
                <h1>Contact and Enrollment</h1>
                <p>Have a question or ready to enroll? <br> Send us your details and we'll get back to you with course
                    and schedule information.</p>
                <a href="#contact-form"><button><b>SCROLL DOWN</b></button></a>
            </div>
        </article>

        <article id="contact-form">
            <h2>Get in Touch</h2>

            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="tel" placeholder="Phone (optional)">
                <label>Interested Course (optional)</label>
                <select>
                    <option>Select a course</option>
                    <option>Mathematics for Beginners</option>
                    <option>Physics Essentials</option>
                    <option>Chemistry Fundamentals</option>
                    <option>English Communication</option>
                    <option>Computer Science Basics</option>
                    <option>Biology Insights</option>
                    <option>Statistics & Data</option>
                    <option>Islamic Studies</option>
                    <option>Pakistan Studies</option>
                    <option>Commerce</option>
                    <option>Accounting</option>
                    <option>Arts & Crafts</option>
                </select>

                <textarea placeholder="Your message" rows="6"></textarea>

                <div class="form-actions">
                    <button class="r-btn" type="reset">Reset</button>
                    <button class="s-btn" type="submit">Submit</button>
                </div>
            </form>
        </article>
    </main>


    <footer>
        <p>© 2026 ARZ Academy</p>
    </footer>
</body>

</html>
